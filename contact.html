  <style>
    body {

      font-size: 32px;
    }

    .links {

    .links a {
      text-decoration: none;
      color: white;
      background: black;
      padding: 14px 20px;
      border-radius: 8px;
      font-weight: 700;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      transition: 0.3s;
    }

    .links a:hover {
      transform: scale(1.05);
      background: #181818;
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }

    .back {
      margin-top: 25px;
      display: inline-block;
